<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-munashii | Terminal</title>
    <style>
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 80%;
            max-width: 600px;
            border: 1px solid #00ff41;
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            animation: breathe 4s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); border-color: #00ff41; }
            50% { box-shadow: 0 0 35px rgba(0, 255, 65, 0.5); border-color: #33ff77; }
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 20px 0;
            letter-spacing: 4px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
        }

        #status {
            line-height: 1.6;
            font-size: 1.1rem;
            min-height: 100px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 
            50% { opacity: 0; } 
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #008f11;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>X-MUNASHII_OS</h1>
    <div id="status"></div><span class="cursor"></span>
    <div class="footer">SYSTEM_ROOT: Liao Jiachen</div>
</div>

<script>
    const content = [
        "> 初始化系统节点...",
        "> 正在加载开发者个人数据...",
        "> 节点位置: 127.0.0.1 (WSL_Ubuntu)",
        "> 状态: 数字化生存模式已激活",
        "> 欢迎回来，廖佳辰。"
    ];

    const statusDiv = document.getElementById("status");
    let lineIndex = 0;
    let charIndex = 0;

    function typeLine() {
        if (lineIndex < content.length) {
            let currentLine = content[lineIndex];
            if (charIndex < currentLine.length) {
                statusDiv.innerHTML += currentLine.charAt(charIndex);
                charIndex++;
                setTimeout(typeLine, 40);
            } else {
                statusDiv.innerHTML += "<br>";
                lineIndex++;
                charIndex = 0;
                setTimeout(typeLine, 500);
            }
        }
    }

    window.onload = typeLine;
</script>

</body>
</html>
